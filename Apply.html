
<!DOCTYPE html>
<html lang="en">

<head>

    <title>Kelp Clinic Registration Form</title>
    
</head>

<body>



<h1>Kelp Clinic Registration Job Form</h1>
<p>Please fill in your details</p>

<form action="submit.php" method="post">

  
    <fieldset>
        <legend>Applicant Details</legend>

        <label for="firstName">First Name:</label><br>
        <input type="text" id="firstName" name="firstName" required
               pattern="[A-Za-z]{1,20}" title="Only letters (max 20)">
        <br><br>

        <label for="lastName">Last Name:</label><br>
        <input type="text" id="lastName" name="lastName" required
               pattern="[A-Za-z]{1,20}" title="Only letters (max 20)">
        <br><br>

        <label for="birthday">Date of Birth:</label>
        <input type="date" id="birthday" name="birthday">

        <br><br>

        <legend>Gender:</legend> <br>
        
        <input type="radio" id="gender2" name="gender" value="gender2" required>
        <label for="gender2">Male</label><br>

        
        <input type="radio" id="gender1" name="gender" value="gender1" required>
         <label for="gender1">Female</label><br>
        <br><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="phone">Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" required
               pattern="[0-9]{10}" title="Enter a 10-digit phone number">
        <br><br>

        
    </fieldset>

   
    <fieldset>
        <legend>Address</legend>

        <label for="street">Street Name:</label><br>
        <input type="text" id="street" name="street" required>
        <br><br>

        <label for="city">City:</label><br>
        <input type="text" id="city" name="city" required>
        <br><br>

        <label for="state">State:</label><br>
        <select id="state" name="state" required>
            <option value="">Please Select</option>
            <option>Australian Capital Territory</option>
            <option>New South Wales</option>
            <option>Northern Territory</option>
            <option>South Australia</option>
            <option>Queensland</option>
            <option>Tasmania</option>
            <option>Victoria</option>
            <option>Western Australia</option>
        </select>

        <br>
        <br>

        <label for="postcode">Postcode:</label><br>
        <input type="text" id="postcode" name="postcode" required
               pattern="[0-9]{4}" title="Enter a 4-digit postcode">

    </fieldset>
    <br>
    <fieldset>
        
        <label for="experiance">Experiance:</label><br>
        <select id="experiance" name="experiance" required>
            <option value="">Please Select</option>
            <option>No experiance</option>
            <option>Less than a year</option>
            <option>One years</option>
            <option>Two years</option>
            <option>Three years</option>
            <option>Four years</option>
            <option>Five years</option>
            <option>Greater than Five years</option>
        </select>

    </fieldset>

    <fieldset>
        <legend>Availibilty</legend>

        <input type="checkbox" id="Monday" name="day" value="Monday">
        <label for="Monday">Monday</label>

        <input type="checkbox" id="Tuesday" name="day" value="Tuesday">
        <label for="Tuesday">Tuesday</label>

        <input type="checkbox" id="Wednesday" name="day" value="Wednesday">
        <label for="Wednesday">Wednesday</label>

        <input type="checkbox" id="Thursday" name="day" value="Thursday">
        <label for="Thursday">Thursday</label>

        <input type="checkbox" id="Friday" name="day" value="Friday">
        <label for="Friday">Friday</label>

        <input type="checkbox" id="Saturday" name="day" value="Saturday">
        <label for="Saturday">Saturday</label>

         <input type="checkbox" id="Sunday" name="day" value="Sunday">
        <label for="Sunday">Sunday</label>


        <br><br>

        <label for="description"></label><br>
        <textarea id="description" name="description" rows="4" cols="40"
                  placeholder="Write the time ranges you are availible here..."></textarea>
    </fieldset>

    <fieldset>
        <legend>SkillSet</legend>

        <input type="checkbox" id="Communication" name="skill" value="Communication">
        <label for="Communication">Communication</label>

        <input type="checkbox" id="Medical Administration" name="skill" value="Medical Administration">
        <label for="Medical Administration">Medical Administration</label>

        <input type="checkbox" id="Clinical Documentation" name="skill" value="Clinical Documentation">
        <label for="Clinical Documentation">Clinical Documentation</label>

        <input type="checkbox" id="Teamwork" name="skill" value="Teamwork">
        <label for="Teamwork">Teamwork</label>

        <input type="checkbox" id="Leadership" name="skill" value="Leadership">
        <label for="Leadership">Leadership</label>

        <input type="checkbox" id="Time Management" name="skill" value="Time Management">
        <label for="Time Management">Time Management</label>

         <input type="checkbox" id="Paitent Care and Assesment" name="skill" value="Paitent Care and Assesment">
        <label for="Paitent Care and Assesment">Paitent Care and Assesment</label>
        <br>
        <label for="description"></label><br>
        <textarea id="description" name="description" rows="4" cols="40"
                  placeholder="List other skills you have here..."></textarea>
    </fieldset>


   
    <fieldset>
        <legend>Preferred Interview</legend>

        <label for="date">Date:</label><br>
        <input type="date" id="date" name="date" required>
        <br><br>

        <label for="time">Time:</label><br>
        <input type="time" id="time" name="time" required>
    </fieldset>

    <br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
