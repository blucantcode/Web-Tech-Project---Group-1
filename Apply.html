

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Apply - Kelp Clinic</title>

    <link rel="stylesheet" href="Styles/maintheme.css">
    <link rel="stylesheet" href="Styles/apply.css">

    <link href="https://fonts.googleapis.com/css2?family=Lora&family=Raleway&display=swap" rel="stylesheet">
</head>

<body>


<div class="banner">

    <nav>
      <div class="navbg"></div>
      <div class="navbar-text">
        <p class="menu"><a href="index.html">Home</a></p>
        <p class="menu"><a href="About.html">About</a> </p>
        <p class="menu"><a href="jobspage.html">Jobs</a></p>
        <p class="menu"><a href="Apply.html">Apply</a></p>
      </div>

      <div class="searchbox">
        <form action="/search" method="get">
          <input type="search" name="q" placeholder="Search..." aria-label="Search through site content">
          <button type="submit"><span class="searchbox-icon material-symbols-outlined">
              search
            </span></button>
        </form>
      </div>
    </nav>
  </div>

<div class="page-title">
    <h1>Job Application Form</h1>
    <p>Please complete all required fields</p>
</div>


<div class="container">

<form action="submit.php" method="post">

    <fieldset>
        <legend>Applicant Details</legend>

        <label>First Name:</label>
        <input type="text" name="firstName" required pattern="[A-Za-z]{1,20}">

        <label>Last Name:</label>
        <input type="text" name="lastName" required pattern="[A-Za-z]{1,20}">

        <label>Date of Birth:</label>
        <input type="date" name="birthday" required>

        <label>Gender:</label>
        <label><input type="radio" name="gender" value="Male"> Male</label>
        <label><input type="radio" name="gender" value="Female"> Female</label>

        <label>Email:</label>
        <input type="email" name="email" required>

        <label>Phone:</label>
        <input type="tel" name="phone" pattern="04[0-9]{8}" required>
    </fieldset>

    <fieldset>
        <legend>Address</legend>

        <label>Street:</label>
        <input type="text" name="street" required>

        <label>City:</label>
        <input type="text" name="city" required>

        <label>State:</label>
        <select name="state" required>
            <option value="">Select</option>
            <option>Victoria</option>
            <option>New South Wales</option>
            <option>Queensland</option>
            <option>South Australia</option>
            <option>Tasmania</option>
            <option>Western Australia</option>
            <option>Northern Territory</option>
            <option>ACT</option>
        </select>

        <label>Postcode:</label>
        <input type="text" name="postcode" pattern="[0-9]{4}" required>
    </fieldset>

    <fieldset>
        <legend>Job Details</legend>

        <label>Job Reference:</label>
        <input type="text" name="jobRef" required>

        <label>Experience:</label>
        <select name="experience" required>
            <option value="">Select</option>
            <option>No experience</option>
            <option>Less than a year</option>
            <option>1-2 years</option>
            <option>3-5 years</option>
            <option>5+ years</option>
        </select>
    </fieldset>

    <fieldset>
        <legend>Availability</legend>

        <label><input type="checkbox" name="day[]" value="Monday"> Monday</label>
        <label><input type="checkbox" name="day[]" value="Tuesday"> Tuesday</label>
        <label><input type="checkbox" name="day[]" value="Wednesday"> Wednesday</label>
        <label><input type="checkbox" name="day[]" value="Thursday"> Thursday</label>
        <label><input type="checkbox" name="day[]" value="Friday"> Friday</label>
        <label><input type="checkbox" name="day[]" value="Saturday"> Saturday</label>
        <label><input type="checkbox" name="day[]" value="Sunday"> Sunday</label>

        <label>Notes:</label>
        <textarea name="availabilityDesc"></textarea>
    </fieldset>

    <fieldset>
        <legend>Skills</legend>

        <label><input type="checkbox" name="skill[]" value="Communication"> Communication</label>
        <label><input type="checkbox" name="skill[]" value="Medical Administration"> Medical Administration</label>
        <label><input type="checkbox" name="skill[]" value="Teamwork"> Teamwork</label>

        <label>Other Skills:</label>
        <textarea name="skillsDesc"></textarea>
    </fieldset>

    <fieldset>
        <legend>Interview</legend>

        <label>Date:</label>
        <input type="date" name="date" required>

        <label>Time:</label>
        <input type="time" name="time" required>
    </fieldset>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</div>

</body>
</html>
